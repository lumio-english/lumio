<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate — Lumio English</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/logo/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/logo/favicon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .cert {
    max-width: 800px; margin: 30px auto; padding: 50px 40px; text-align: center;
    background: #fff; border: 6px double var(--orange); border-radius: var(--radius);
    box-shadow: var(--sticker-shadow);
  }
  .cert h1 { color: var(--orange); font-size: 2.6rem; }
  .cert .name { font-family: var(--font-display); font-size: 2.4rem; margin: 18px 0;
    border-bottom: 4px dashed var(--sun); display: inline-block; padding: 0 30px 6px; }
  @media print { .no-print { display: none !important; } body { background: #fff; } }
</style>
</head>
<body>

<header class="topbar no-print">
  <a href="student.html" class="btn btn-ghost">← Back</a>
  <div class="brand">Lumio <span>English</span></div>
  <div class="spacer"></div>
  <button class="btn btn-primary" onclick="print()">Print / Save PDF</button>
</header>

<main>
  <div class="cert" id="cert">
    <img src="assets/logo/lumio-logo.png" alt="Lumio English logo" style="width:130px;border-radius:20px">
    <h1>Certificate of Achievement</h1>
    <p style="font-weight:700;font-size:1.1rem">This certificate is proudly presented to</p>
    <div class="name" id="certName">Student</div>
    <p style="font-weight:700;font-size:1.15rem">for completing <b id="certLevel">Pre-A</b> of Lumio English<br>
      with <span id="certStars">0</span> stars!</p>
    <p class="mt" style="font-weight:800">Learn · Speak · Grow</p>
    <p style="color:var(--cocoa-soft);font-weight:700" id="certDate"></p>
  </div>
  <p class="center no-print" id="notDone" style="display:none;font-weight:800;color:var(--coral)">
    Finish all 20 lessons to unlock your certificate!</p>
</main>

<script src="js/app.js"></script>
<script>
(() => {
  const u = Lumio.requireUser();
  const level = u.level || "pre-a";
  const meta = Lumio.LEVELS.find(l => l.id === level);
  const prog = (Lumio.progressFor(u.name)[level]) || {};
  const done = Object.keys(prog).length;
  const stars = Object.values(prog).reduce((s, r) => s + (r.stars || 0), 0);

  document.getElementById("certName").textContent = u.name;
  document.getElementById("certLevel").textContent = meta ? meta.name : level;
  document.getElementById("certStars").textContent = `★ ${stars}`;
  document.getElementById("certDate").textContent = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });

  if (done < (meta ? meta.lessons : 20)) {
    document.getElementById("cert").style.opacity = ".35";
    document.getElementById("notDone").style.display = "block";
  }
})();
</script>
</body>
</html>
