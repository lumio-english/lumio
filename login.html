<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Lumio English</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .lg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin:14px 0}
  .lg-profile{
    background:#fff;border:2px solid var(--line,#eee);border-radius:16px;padding:14px 8px;text-align:center;
    cursor:pointer;transition:.12s;
  }
  .lg-profile:hover{border-color:var(--orange,#FF8A3D);transform:translateY(-2px)}
  .lg-profile.selected{border-color:var(--orange,#FF8A3D);background:#FFF6EC}
  .lg-avatar{font-size:2.1rem;line-height:1}
  .lg-name{font-weight:800;margin-top:6px;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lg-empty{
    text-align:center;color:var(--cocoa-soft,#8A7160);font-weight:700;padding:18px 10px;
    background:#FBF6EC;border-radius:14px;font-size:.9rem;
  }
  .lg-pinwrap{display:none;text-align:center;margin-top:6px}
  .lg-pinwrap.show{display:block}
  .lg-pin-dots{display:flex;gap:10px;justify-content:center;margin:14px 0}
  .lg-pin-dot{width:16px;height:16px;border-radius:50%;background:#ECE4D6;border:2px solid #DCD2BE}
  .lg-pin-dot.filled{background:var(--orange,#FF8A3D);border-color:var(--orange,#FF8A3D)}
  .lg-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto}
  .lg-pad button{
    padding:12px 0;border-radius:12px;border:1px solid var(--line,#eee);background:#fff;font-weight:800;
    font-size:1.05rem;cursor:pointer;font-family:inherit;
  }
  .lg-pad button:active{background:#FFF1E0}
  .lg-pin-error{color:var(--coral,#FF6B6B);font-weight:800;font-size:.85rem;text-align:center;height:18px;margin-top:6px}
  .lg-pin-error.shake{animation:lgshake .3s}
  @keyframes lgshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .lg-back{background:none;border:none;color:var(--cocoa-soft,#8A7160);font-weight:700;cursor:pointer;font-size:.82rem;margin-bottom:8px}
  .lg-toggle-advanced{
    display:block;text-align:center;margin-top:14px;font-size:.8rem;color:var(--cocoa-soft,#8A7160);
    font-weight:700;cursor:pointer;background:none;border:none;text-decoration:underline;width:100%;
  }
  #advancedStudent{display:none;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line,#eee)}
  #advancedStudent.show{display:block}
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html"><img class="logo-mini" src="assets/logo/lumio-logo.png" alt="Lumio English logo" onerror="this.style.display='none'"></a>
  <div class="brand">Lumio <span>English</span></div>
</header>

<main class="wrap" style="max-width:560px">

  <div class="row mt mb" style="justify-content:center">
    <button class="btn btn-sun" id="tabStudent">Student</button>
    <button class="btn" id="tabTeacher">Teacher</button>
  </div>

  <!-- Student login -->
  <div class="card" id="paneStudent">
    <h2 class="center" id="studentHeading">Hi friend! Who are you?</h2>

    <div id="rosterView">
      <div class="lg-grid" id="rosterGrid"></div>
      <div class="lg-empty" id="rosterEmpty" style="display:none">
        No profiles yet! Ask your teacher to add you on the Teacher Dashboard 🙂
      </div>
    </div>

    <div class="lg-pinwrap" id="pinView">
      <button class="lg-back" id="pinBack">← Not me</button>
      <p class="center" style="font-weight:800;margin:4px 0">
        <span id="pinAvatar" style="font-size:1.6rem"></span><br>
        Enter your PIN, <span id="pinName"></span>
      </p>
      <div class="lg-pin-dots" id="pinDots"></div>
      <div class="lg-pad" id="pinPad"></div>
      <div class="lg-pin-error" id="pinError"></div>
    </div>

    <button class="lg-toggle-advanced" id="toggleAdvanced">Not on the list? Start without a profile</button>
    <div id="advancedStudent">
      <label for="sname">My name</label>
      <input type="text" id="sname" placeholder="e.g. Salem" maxlength="24" autocomplete="off">
      <label for="slevel">My level</label>
      <select id="slevel"></select>
      <button class="btn btn-primary btn-big mt" style="width:100%" id="goStudent">Start my adventure!</button>
    </div>
  </div>

  <!-- Teacher login -->
  <div class="card" id="paneTeacher" style="display:none">
    <h2 class="center">Who's teaching?</h2>

    <div id="teacherRosterView">
      <div class="lg-grid" id="teacherGrid"></div>
      <button class="lg-toggle-advanced" id="addTeacherToggle" style="margin-top:8px">+ Add another teacher</button>
      <div id="addTeacherBox" style="display:none;margin-top:12px;text-align:left">
        <label for="newTeacherName">Name</label>
        <input type="text" id="newTeacherName" placeholder="e.g. Ms. Sara" maxlength="30" autocomplete="off">
        <button class="btn btn-teal mt" style="width:100%" id="newTeacherSave">Add teacher</button>
        <div class="lg-pin-error" id="newTeacherError"></div>
      </div>
    </div>

    <div class="lg-pinwrap" id="teacherPinView">
      <button class="lg-back" id="teacherPinBack">← Not me</button>
      <p class="center" style="font-weight:800;margin:4px 0">
        <span id="teacherPinAvatar" style="font-size:1.6rem"></span><br>
        Enter your PIN, <span id="teacherPinName"></span>
      </p>
      <div class="lg-pin-dots" id="teacherPinDots"></div>
      <div class="lg-pad" id="teacherPinPad"></div>
      <div class="lg-pin-error" id="teacherPinError"></div>
    </div>

    <div style="margin-top:16px;padding-top:16px;border-top:1px dashed var(--line,#eee)">
      <label for="tpin">Classroom PIN</label>
      <input type="password" id="tpin" placeholder="••••" inputmode="numeric">
      <p class="mt" style="font-size:.85rem;color:var(--cocoa-soft,#8A7160)">This unlocks the dashboard itself. Default is <b>2026</b> — change it in <code>js/auth.js</code>.</p>
      <button class="btn btn-teal btn-big mt" style="width:100%" id="goTeacher">Open dashboard</button>
    </div>
    <!-- kept for backward compatibility with any code still reading #tname -->
    <input type="hidden" id="tname">
  </div>

</main>

<script src="js/app.js"></script>
<script src="js/lumio-profiles.js"></script>
<script>
(function () {
  // ================= Student roster picker =================
  // Note: real login/session logic still lives in js/auth.js and reacts to
  // the existing #sname / #slevel / #goStudent elements — we just fill
  // those in and click the existing button once a roster PIN checks out.
  try {
    const grid = document.getElementById("rosterGrid");
    const empty = document.getElementById("rosterEmpty");
    const rosterView = document.getElementById("rosterView");
    const pinView = document.getElementById("pinView");
    const pinDots = document.getElementById("pinDots");
    const pinPad = document.getElementById("pinPad");
    const pinError = document.getElementById("pinError");
    const heading = document.getElementById("studentHeading");

    let students = (window.LumioProfiles && LumioProfiles.listStudents()) || [];
    let activeStudent = null;
    let pinBuffer = "";

    function renderRoster() {
      grid.innerHTML = "";
      if (!students.length) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      students.forEach(s => {
        const el = document.createElement("div");
        el.className = "lg-profile";
        el.innerHTML = `<div class="lg-avatar">${s.avatar || "🙂"}</div><div class="lg-name">${s.name}</div>`;
        el.onclick = () => openPinFor(s);
        grid.appendChild(el);
      });
    }

    function renderDots() {
      pinDots.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const d = document.createElement("div");
        d.className = "lg-pin-dot" + (i < pinBuffer.length ? " filled" : "");
        pinDots.appendChild(d);
      }
    }

    function renderPad() {
      pinPad.innerHTML = "";
      const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
      keys.forEach(k => {
        const btn = document.createElement("button");
        if (k === "") { btn.style.visibility = "hidden"; pinPad.appendChild(btn); return; }
        btn.textContent = k;
        btn.type = "button";
        btn.onclick = () => {
          if (k === "⌫") { pinBuffer = pinBuffer.slice(0, -1); }
          else if (pinBuffer.length < 4) { pinBuffer += k; }
          renderDots();
          pinError.textContent = "";
          if (pinBuffer.length === 4) tryLogin();
        };
        pinPad.appendChild(btn);
      });
    }

    function openPinFor(s) {
      activeStudent = s;
      pinBuffer = "";
      document.getElementById("pinAvatar").textContent = s.avatar || "🙂";
      document.getElementById("pinName").textContent = s.name;
      rosterView.style.display = "none";
      heading.style.display = "none";
      pinView.classList.add("show");
      renderDots();
      pinError.textContent = "";
    }
    function closePinView() {
      activeStudent = null;
      pinBuffer = "";
      rosterView.style.display = "block";
      heading.style.display = "block";
      pinView.classList.remove("show");
    }

    async function tryLogin() {
      const ok = window.LumioProfiles && await LumioProfiles.verifyStudentLogin(activeStudent.name, pinBuffer);
      if (!ok) {
        pinError.textContent = "That PIN doesn't match — try again.";
        pinError.classList.remove("shake"); void pinError.offsetWidth; pinError.classList.add("shake");
        pinBuffer = "";
        renderDots();
        return;
      }
      const nameField = document.getElementById("sname");
      const levelField = document.getElementById("slevel");
      const goBtn = document.getElementById("goStudent");
      if (nameField) nameField.value = ok.name;
      if (levelField && [...levelField.options].some(o => o.value === ok.level)) {
        levelField.value = ok.level;
      }
      if (goBtn) goBtn.click();
    }

    document.getElementById("pinBack").onclick = closePinView;
    renderRoster();
    renderPad();
  } catch (e) {
    console.error("Lumio roster login error:", e);
  }

  // ================= Advanced (no-profile) toggle =================
  const advToggle = document.getElementById("toggleAdvanced");
  const advBox = document.getElementById("advancedStudent");
  advToggle.addEventListener("click", () => {
    advBox.classList.toggle("show");
    advToggle.textContent = advBox.classList.contains("show")
      ? "Hide this"
      : "Not on the list? Start without a profile";
  });

  // ================= Teacher picker (mirrors the student flow) =================
  try {
    const tGrid = document.getElementById("teacherGrid");
    const tRosterView = document.getElementById("teacherRosterView");
    const tPinView = document.getElementById("teacherPinView");
    const tPinDots = document.getElementById("teacherPinDots");
    const tPinPad = document.getElementById("teacherPinPad");
    const tPinError = document.getElementById("teacherPinError");
    const tnameHidden = document.getElementById("tname");

    let teachers = (window.LumioProfiles && LumioProfiles.listTeachers()) || [];
    let activeTeacher = null;
    let tPinBuffer = "";
    let selectedTeacherId = (window.LumioProfiles && LumioProfiles.getCurrentTeacherId())
      || (teachers[0] && teachers[0].id) || null;

    function renderTeacherGrid() {
      tGrid.innerHTML = "";
      teachers.forEach(t => {
        const el = document.createElement("div");
        el.className = "lg-profile" + (t.id === selectedTeacherId ? " selected" : "");
        el.innerHTML = `<div class="lg-avatar">${t.avatar || "🙂"}</div><div class="lg-name">${t.name}</div>`;
        el.onclick = () => openTeacherPinFor(t);
        tGrid.appendChild(el);
      });
    }
    function renderTeacherDots() {
      tPinDots.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const d = document.createElement("div");
        d.className = "lg-pin-dot" + (i < tPinBuffer.length ? " filled" : "");
        tPinDots.appendChild(d);
      }
    }
    function renderTeacherPad() {
      tPinPad.innerHTML = "";
      const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
      keys.forEach(k => {
        const btn = document.createElement("button");
        if (k === "") { btn.style.visibility = "hidden"; tPinPad.appendChild(btn); return; }
        btn.textContent = k;
        btn.type = "button";
        btn.onclick = () => {
          if (k === "⌫") { tPinBuffer = tPinBuffer.slice(0, -1); }
          else if (tPinBuffer.length < 4) { tPinBuffer += k; }
          renderTeacherDots();
          tPinError.textContent = "";
          if (tPinBuffer.length === 4) tryTeacherLogin();
        };
        tPinPad.appendChild(btn);
      });
    }
    function openTeacherPinFor(t) {
      activeTeacher = t;
      tPinBuffer = "";
      document.getElementById("teacherPinAvatar").textContent = t.avatar || "🙂";
      document.getElementById("teacherPinName").textContent = t.name;
      tRosterView.style.display = "none";
      tPinView.classList.add("show");
      renderTeacherDots();
      tPinError.textContent = "";
    }
    function closeTeacherPinView() {
      activeTeacher = null;
      tPinBuffer = "";
      tRosterView.style.display = "block";
      tPinView.classList.remove("show");
    }
    async function tryTeacherLogin() {
      const ok = window.LumioProfiles && await LumioProfiles.verifyTeacherLogin(activeTeacher.name, tPinBuffer);
      if (!ok) {
        tPinError.textContent = "That PIN doesn't match — try again.";
        tPinError.classList.remove("shake"); void tPinError.offsetWidth; tPinError.classList.add("shake");
        tPinBuffer = "";
        renderTeacherDots();
        return;
      }
      selectedTeacherId = ok.id;
      if (window.LumioProfiles) LumioProfiles.setCurrentTeacherId(ok.id);
      tnameHidden.value = ok.name;
      closeTeacherPinView();
      renderTeacherGrid();
    }
    document.getElementById("teacherPinBack").onclick = closeTeacherPinView;

    // Selecting who's teaching just marks them "pending" — no PIN needed to
    // *choose* an identity; the personal PIN only confirms it. If they never
    // tap a card, the previously-selected (or first) teacher stays selected,
    // so a single-teacher setup needs zero extra taps here.
    renderTeacherGrid();
    renderTeacherPad();

    // Add-teacher inline shortcut
    const addToggle = document.getElementById("addTeacherToggle");
    const addBox = document.getElementById("addTeacherBox");
    addToggle.addEventListener("click", () => {
      addBox.style.display = addBox.style.display === "block" ? "none" : "block";
    });
    document.getElementById("newTeacherSave").addEventListener("click", async () => {
      const nameInput = document.getElementById("newTeacherName");
      const err = document.getElementById("newTeacherError");
      try {
        const t = await LumioProfiles.addTeacher({ name: nameInput.value });
        teachers = LumioProfiles.listTeachers();
        selectedTeacherId = t.id;
        nameInput.value = "";
        err.textContent = "";
        addBox.style.display = "none";
        renderTeacherGrid();
      } catch (e) {
        err.textContent = e.message || "Couldn't add that teacher.";
      }
    });

    // Ensure the classroom-PIN button still records whichever teacher was
    // last confirmed (or the default) before your existing auth.js runs.
    document.getElementById("goTeacher").addEventListener("click", () => {
      if (window.LumioProfiles && selectedTeacherId) LumioProfiles.setCurrentTeacherId(selectedTeacherId);
    });
  } catch (e) {
    console.error("Lumio teacher picker error:", e);
  }
})();
</script>
<script src="js/auth.js"></script>
</body>
</html>
