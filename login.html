<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Lumio English</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/logo/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/logo/favicon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body{opacity:0;animation:pageFadeIn .45s ease forwards}
  @keyframes pageFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .btn{transition:transform .16s cubic-bezier(.22,1,.36,1),box-shadow .16s ease}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(0,0,0,.12)}
  .btn:active{transform:translateY(0) scale(.96);box-shadow:0 3px 8px rgba(0,0,0,.1)}
  .btn:focus-visible{outline:3px solid rgba(255,138,61,.45);outline-offset:2px}

  .lg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin:14px 0}
  .lg-profile{
    background:#fff;border:2px solid var(--line,#eee);border-radius:16px;padding:14px 8px;text-align:center;
    cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1),box-shadow .16s ease,border-color .16s ease;
  }
  .lg-profile:hover{border-color:var(--orange,#FF8A3D);transform:translateY(-3px);box-shadow:0 8px 18px rgba(0,0,0,.09)}
  .lg-profile:active{transform:translateY(-1px) scale(.97)}
  .lg-profile:focus-visible{outline:3px solid rgba(255,138,61,.45);outline-offset:2px}
  .lg-profile.selected{border-color:var(--orange,#FF8A3D);background:#FFF6EC}
  .lg-avatar{font-size:2.1rem;line-height:1}
  .lg-name{font-weight:800;margin-top:6px;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lg-empty{
    text-align:center;color:var(--cocoa-soft,#8A7160);font-weight:700;padding:18px 10px;
    background:#FBF6EC;border-radius:14px;font-size:.9rem;
  }
  .lg-pinwrap{display:none;text-align:center;margin-top:6px;animation:lgPinIn .25s ease}
  .lg-pinwrap.show{display:block}
  @keyframes lgPinIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .lg-pin-dots{display:flex;gap:10px;justify-content:center;margin:14px 0}
  .lg-pin-dot{width:16px;height:16px;border-radius:50%;background:#ECE4D6;border:2px solid #DCD2BE;transition:transform .15s ease,background .15s ease}
  .lg-pin-dot.filled{background:var(--orange,#FF8A3D);border-color:var(--orange,#FF8A3D);transform:scale(1.15)}
  .lg-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto}
  .lg-pad button{
    padding:12px 0;border-radius:12px;border:1px solid var(--line,#eee);background:#fff;font-weight:800;
    font-size:1.05rem;cursor:pointer;font-family:inherit;transition:transform .12s ease,background .12s ease,box-shadow .12s ease;
  }
  .lg-pad button:hover{box-shadow:0 4px 10px rgba(0,0,0,.08);transform:translateY(-1px)}
  .lg-pad button:active{background:#FFF1E0;transform:translateY(0) scale(.94)}
  .lg-pin-error{color:var(--coral,#FF6B6B);font-weight:800;font-size:.85rem;text-align:center;height:18px;margin-top:6px}
  .lg-pin-error.shake{animation:lgshake .3s}
  @keyframes lgshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .lg-back{background:none;border:none;color:var(--cocoa-soft,#8A7160);font-weight:700;cursor:pointer;font-size:.82rem;margin-bottom:8px;transition:opacity .15s ease}
  .lg-back:hover{opacity:.7}
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html"><img class="logo-mini" src="assets/logo/lumio-logo.png" alt="Lumio English logo" onerror="this.style.display='none'"></a>
  <div class="brand">Lumio <span>English</span></div>
</header>

<main class="wrap" style="max-width:560px">

  <!-- Student login (the only visible path on this page) -->
  <div class="card" id="paneStudent">
    <h2 class="center" id="studentHeading">Hi friend! Who are you?</h2>

    <div id="rosterView">
      <div class="lg-grid" id="rosterGrid"></div>
      <div class="lg-empty" id="rosterEmpty" style="display:none">
        No profiles yet! Ask your teacher to add you 🙂
      </div>
    </div>

    <div style="margin-top:18px;padding-top:16px;border-top:1px dashed var(--line,#eee);text-align:center">
      <p style="font-weight:700;font-size:.82rem;color:var(--cocoa-soft,#8A7160);margin:0 0 10px">New here and not on the list yet?</p>
      <a class="btn btn-teal" href="lumio-pro-test.html" style="width:100%;display:block;text-align:center;box-sizing:border-box">🎯 Take our free placement test</a>
    </div>

    <div class="lg-pinwrap" id="pinView">
      <button class="lg-back" id="pinBack">← Not me</button>
      <p class="center" style="font-weight:800;margin:4px 0">
        <span id="pinAvatar" style="font-size:1.6rem"></span><br>
        Enter your PIN, <span id="pinName"></span>
      </p>
      <div class="lg-pin-dots" id="pinDots"></div>
      <div class="lg-pad" id="pinPad"></div>
      <div class="lg-pin-error" id="pinError"></div>
    </div>

  </div>

  <!--
    Hidden compatibility placeholders below. js/auth.js (unmodified) expects
    #tabStudent, #tabTeacher, #paneTeacher, #sname, #slevel, #goStudent,
    #tpin, and #goTeacher to exist. There is deliberately no visible
    "start without a profile" option any more — a student can only reach
    student.html by picking their roster avatar and entering the correct
    PIN, which is what fills these hidden fields and clicks #goStudent
    programmatically. Teachers use a completely separate page
    (teacher-portal.html), not linked from anywhere on the public site.
  -->
  <div style="display:none" aria-hidden="true">
    <button id="tabStudent"></button>
    <button id="tabTeacher"></button>
    <input type="text" id="sname">
    <select id="slevel"></select>
    <button id="goStudent"></button>
    <div id="paneTeacher">
      <input type="password" id="tpin">
      <button id="goTeacher"></button>
    </div>
  </div>

</main>

<script src="js/app.js"></script>
<script src="js/lumio-profiles.js"></script>
<script>
(function () {
  // ================= Student roster picker =================
  // Note: real login/session logic still lives in js/auth.js and reacts to
  // the existing #sname / #slevel / #goStudent elements — we just fill
  // those in and click the existing button once a roster PIN checks out.
  try {
    const grid = document.getElementById("rosterGrid");
    const empty = document.getElementById("rosterEmpty");
    const rosterView = document.getElementById("rosterView");
    const pinView = document.getElementById("pinView");
    const pinDots = document.getElementById("pinDots");
    const pinPad = document.getElementById("pinPad");
    const pinError = document.getElementById("pinError");
    const heading = document.getElementById("studentHeading");

    let students = (window.LumioProfiles && LumioProfiles.listStudents()) || [];
    let activeStudent = null;
    let pinBuffer = "";

    function renderRoster() {
      grid.innerHTML = "";
      if (!students.length) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      students.forEach(s => {
        const el = document.createElement("div");
        el.className = "lg-profile";
        el.tabIndex = 0;
        el.innerHTML = `<div class="lg-avatar">${s.avatar || "🙂"}</div><div class="lg-name">${s.name}</div>`;
        el.onclick = () => openPinFor(s);
        el.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openPinFor(s); } };
        grid.appendChild(el);
      });
    }

    function renderDots() {
      pinDots.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const d = document.createElement("div");
        d.className = "lg-pin-dot" + (i < pinBuffer.length ? " filled" : "");
        pinDots.appendChild(d);
      }
    }

    function renderPad() {
      pinPad.innerHTML = "";
      const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
      keys.forEach(k => {
        const btn = document.createElement("button");
        if (k === "") { btn.style.visibility = "hidden"; pinPad.appendChild(btn); return; }
        btn.textContent = k;
        btn.type = "button";
        btn.onclick = () => {
          if (k === "⌫") { pinBuffer = pinBuffer.slice(0, -1); }
          else if (pinBuffer.length < 4) { pinBuffer += k; }
          renderDots();
          pinError.textContent = "";
          if (pinBuffer.length === 4) tryLogin();
        };
        pinPad.appendChild(btn);
      });
    }

    function openPinFor(s) {
      activeStudent = s;
      pinBuffer = "";
      document.getElementById("pinAvatar").textContent = s.avatar || "🙂";
      document.getElementById("pinName").textContent = s.name;
      rosterView.style.display = "none";
      heading.style.display = "none";
      pinView.classList.add("show");
      renderDots();
      pinError.textContent = "";
    }
    function closePinView() {
      activeStudent = null;
      pinBuffer = "";
      rosterView.style.display = "block";
      heading.style.display = "block";
      pinView.classList.remove("show");
    }

    async function tryLogin() {
      const ok = window.LumioProfiles && await LumioProfiles.verifyStudentLogin(activeStudent.name, pinBuffer);
      if (!ok) {
        pinError.textContent = "That PIN doesn't match — try again.";
        pinError.classList.remove("shake"); void pinError.offsetWidth; pinError.classList.add("shake");
        pinBuffer = "";
        renderDots();
        return;
      }
      const nameField = document.getElementById("sname");
      const levelField = document.getElementById("slevel");
      const goBtn = document.getElementById("goStudent");
      if (nameField) nameField.value = ok.name;
      if (levelField && [...levelField.options].some(o => o.value === ok.level)) {
        levelField.value = ok.level;
      }
      if (goBtn) goBtn.click();
    }

    document.getElementById("pinBack").onclick = closePinView;
    renderRoster();
    renderPad();

    // Auto-refresh in the background — the roster URL is baked into the
    // deployed site (see js/lumio-profiles.js), so this needs zero manual
    // setup on this specific device. Renders instantly with whatever's
    // cached first, then quietly re-renders if a fresher roster comes in.
    // Never blocks login or shows an error if it fails — a student on a
    // flaky connection should still be able to log in with cached data.
    // Repeats every 5 minutes so a shared device left sitting on this
    // screen (e.g. a classroom tablet) stays current without anyone
    // touching it, skipping entirely while the tab isn't visible.
    function refreshRosterInBackground() {
      if (!window.LumioProfiles) return;
      LumioProfiles.syncNow().then(res => {
        if (res && res.ok) {
          students = LumioProfiles.listStudents();
          if (!activeStudent) renderRoster();
        }
      }).catch(() => {});
    }
    refreshRosterInBackground();
    setInterval(() => { if (!document.hidden) refreshRosterInBackground(); }, 5 * 60 * 1000);
  } catch (e) {
    console.error("Lumio roster login error:", e);
  }
})();
</script>
<script src="js/auth.js"></script>
</body>
</html>
