<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balloon Pop — Lumio English</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  body { overflow: hidden; height: 100vh;
    background: linear-gradient(180deg, #7EC8F2 0%, #BEE3F8 60%, #E8F6FF 100%); }
  #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 14px; padding: 14px 20px; }
  #hud .pill { background: #fff; border-radius: 999px; padding: 8px 18px; font-family: var(--font-display); font-weight: 800; box-shadow: var(--sh-sm); }
  #prompt { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 30; text-align: center; }
  #prompt .card { background: #fff; border-radius: 24px; padding: 14px 30px; box-shadow: var(--sh-md); }
  #prompt .word { font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; color: var(--orange); }
  .sky { position: absolute; inset: 0; overflow: hidden; }
  .balloon {
    position: absolute; bottom: -220px; width: 130px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center;
    animation: rise linear forwards;
    -webkit-tap-highlight-color: transparent;
  }
  .balloon .body {
    width: 130px; height: 155px; border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    display: flex; align-items: center; justify-content: center; text-align: center;
    box-shadow: inset -10px -14px 0 rgba(0,0,0,.07), 0 10px 22px rgba(0,0,0,.15);
    font-family: var(--font-display); font-weight: 800; color: #fff; font-size: 1.05rem; padding: 10px;
  }
  .balloon .tie { width: 8px; height: 14px; background: inherit; filter: brightness(.8); clip-path: polygon(0 0,100% 0,50% 100%); }
  .balloon .string { width: 2px; height: 60px; background: rgba(255,255,255,.7); }
  @keyframes rise { from { transform: translateY(0) rotate(-4deg); } to { transform: translateY(-115vh) rotate(4deg); } }
  .balloon.pop { animation: none !important; pointer-events: none; }
  .pop-burst { animation: burst .35s ease forwards; }
  @keyframes burst { to { transform: scale(1.6); opacity: 0; } }
  #endcard {
    position: fixed; inset: 0; z-index: 60; display: none;
    align-items: center; justify-content: center; background: rgba(20,60,90,.55);
  }
  #endcard .box { background: #fff; border-radius: 28px; padding: 40px 50px; text-align: center; box-shadow: var(--sh-lg); max-width: 420px; }
</style>
</head>
<body>

<div id="hud">
  <a class="btn btn-ghost" href="../present.html" style="background:#fff">Exit</a>
  <span class="pill">★ <span id="score">0</span></span>
  <span class="pill">⏱️ <span id="time">45</span>s</span>
</div>
<div id="prompt"><div class="card">Listen and pop: <span class="word" id="promptWord">...</span> <button class="speak-btn" style="margin-left:10px;padding:6px 16px;font-size:.9rem;display:inline-flex;align-items:center" onclick="Lumio.speak(currentTarget.en)" aria-label="Listen"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/><path d="M16.5 8.5a5 5 0 010 7M19 6a9 9 0 010 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg></button></div></div>

<div class="sky" id="sky"></div>

<div id="endcard">
  <div class="box">
    <h1 style="font-family:var(--font-display)">Time's up!</h1>
    <p style="font-weight:800;font-size:1.4rem;margin:14px 0" id="finalScore"></p>
    <div class="row" style="justify-content:center">
      <button class="btn btn-primary" onclick="location.reload()">↺ Play again</button>
      <a class="btn btn-teal" href="../present.html">Back to lesson</a>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/lessons-data.js"></script>
<script>
const level = Lumio.qs("level") || "pre-a";
const num = parseInt(Lumio.qs("n") || "1", 10);
const lesson = window.LUMIO_LESSONS?.[level]?.[num];
const vocab = lesson ? lesson.vocab : [];
if (!vocab.length) document.body.innerHTML = "<p style='padding:40px;color:#fff'>No lesson data found.</p>";

const COLORS = ["#F97316","#0D9488","#F43F5E","#8B5CF6","#F59E0B","#22C55E","#3B82F6","#EC4899"];
let score = 0, timeLeft = 45, currentTarget = null, spawnTimer = null, tickTimer = null, running = true;

const sky = document.getElementById("sky");

function pickTarget() {
  currentTarget = vocab[Math.floor(Math.random() * vocab.length)];
  document.getElementById("promptWord").textContent = currentTarget.en;
  setTimeout(() => Lumio.speak(currentTarget.en), 200);
}

function spawnBalloon() {
  if (!running) return;
  const isTarget = Math.random() < 0.35 || !document.querySelector('.balloon[data-ok="1"]');
  const word = isTarget ? currentTarget : vocab[Math.floor(Math.random() * vocab.length)];
  const ok = word.en === currentTarget.en;
  const el = document.createElement("div");
  el.className = "balloon";
  el.dataset.ok = ok ? "1" : "0";
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const duration = 6 + Math.random() * 3;
  const left = 4 + Math.random() * 84;
  el.style.left = left + "vw";
  el.style.animationDuration = duration + "s";
  el.innerHTML = `<div class="body" style="background:${color}">${word.en}</div><div class="tie" style="background:${color}"></div><div class="string"></div>`;
  el.onclick = () => pop(el, ok);
  el.addEventListener("animationend", () => el.remove());
  sky.appendChild(el);
}

function pop(el, ok) {
  if (el.classList.contains("pop")) return;
  el.classList.add("pop");
  if (ok) {
    score++; document.getElementById("score").textContent = score;
    Lumio.beep(true);
    el.querySelector(".body").style.background = "var(--green)";
    el.classList.add("pop-burst");
    setTimeout(() => { el.remove(); pickTarget(); }, 250);
  } else {
    Lumio.beep(false);
    el.querySelector(".body").style.background = "var(--coral)";
    el.classList.add("pop-burst");
    setTimeout(() => el.remove(), 250);
  }
}

function tick() {
  timeLeft--;
  document.getElementById("time").textContent = timeLeft;
  if (timeLeft <= 0) endGame();
}

function endGame() {
  running = false;
  clearInterval(spawnTimer); clearInterval(tickTimer);
  document.querySelectorAll(".balloon").forEach(b => b.remove());
  document.getElementById("finalScore").textContent = `You popped ${score} correct balloons!`;
  document.getElementById("endcard").style.display = "flex";
  Lumio.confetti(80);
  Lumio.speak(score >= 8 ? "Amazing! You are a balloon pop champion!" : "Great job! Try again to pop even more!");
}

if (vocab.length) {
  pickTarget();
  spawnTimer = setInterval(spawnBalloon, 900);
  tickTimer = setInterval(tick, 1000);
}
</script>
</body>
</html>
